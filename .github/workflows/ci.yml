name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Unit tests (no network)
        env:
          CLRTY_RPC_SMOKE: "0"
        run: npm test
      - name: Gate (rules only)
        env:
          CLRTY_RPC_SMOKE: "0"
          NODE_ENV: test
          CLRTY_L1_RPC: https://rpc.clarity-fintech.com
          CLRTY_L1_CHAIN_ID: clrty-1
          CLRTY_L1_NUMERIC_CHAIN_ID: "1202"
        run: npx tsx src/gate.ts --no-smoke

  smoke:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.CLRTY_ENABLE_RPC_SMOKE == 'true' }}
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Optional CLRTY-1 RPC smoke
        env:
          CLRTY_RPC_SMOKE: "1"
          CLRTY_L1_RPC: ${{ secrets.CLRTY_L1_RPC }}
          CLRTY_L1_CHAIN_ID: clrty-1
          CLRTY_L1_NUMERIC_CHAIN_ID: "1202"
        run: |
          export CLRTY_L1_RPC="${CLRTY_L1_RPC:-https://rpc.clarity-fintech.com}"
          npm run smoke
        continue-on-error: true
